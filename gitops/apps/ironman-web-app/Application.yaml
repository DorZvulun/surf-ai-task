apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ironman-web-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DorZvulun/surf-ai-task
    targetRevision: HEAD
    path: gitops/chart
    helm:
      valueFiles:
        - ../apps/ironman-web-app/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
