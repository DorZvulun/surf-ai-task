name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build and deploy even if no relevant files changed'
        type: boolean
        default: false

jobs:
  lint-and-validate:
    runs-on: ubuntu-24.04
    outputs:
      app_changed: ${{ steps.filter.outputs.app }}
      deploy_needed: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.repository.default_branch || 'main' }}
          filters: |
            app:
              - 'app/**'
            deploy:
              - 'app/**'
              - 'infra/**'
              - 'gitops/**'
              - 'k3d-config.yaml'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform -chdir=infra fmt -check

      - name: Terraform init
        run: terraform -chdir=infra init

      - name: Terraform validate
        run: terraform -chdir=infra validate

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint gitops/chart/

  deploy-and-test:
    needs: lint-and-validate
    runs-on: ubuntu-24.04
    if: >
      (github.event_name == 'push' && needs.lint-and-validate.outputs.deploy_needed == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.force_build == true)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: needs.lint-and-validate.outputs.app_changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: needs.lint-and-validate.outputs.app_changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: needs.lint-and-validate.outputs.app_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: app/
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ironman-web-app:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ironman-web-app:latest

      - name: Update python-app image tag
        if: needs.lint-and-validate.outputs.app_changed == 'true'
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq -i ".image.tag = \"${{ github.sha }}\"" gitops/apps/python-app/values.yaml

      - name: Commit and push updated values
        if: needs.lint-and-validate.outputs.app_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/apps/python-app/values.yaml
          git commit -m "[ci] update python-app image to ${{ github.sha }}"
          git push

      - name: Install k3d
        run: wget -q -O - https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install kubectl
        run: |
          ARCH=$(dpkg --print-architecture)
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/${ARCH}/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Create .secrets file
        run: |
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .secrets
          echo "DOCKERHUB_TOKEN=${{ secrets.DOCKERHUB_TOKEN }}" >> .secrets

      - name: Terraform init
        run: make init

      - name: Apply cluster and infrastructure
        run: make apply

      - name: Wait for ArgoCD apps to be created
        run: |
          for app in python-app echo-app podinfo; do
            echo "Waiting for Application/$app to exist..."
            until kubectl -n argocd get application "$app" 2>/dev/null; do sleep 5; done
          done

      - name: Wait for ArgoCD sync
        run: |
          for app in python-app echo-app podinfo; do
            echo "Waiting for $app to sync..."
            until [ "$(kubectl -n argocd get application "$app" -o jsonpath='{.status.sync.status}' 2>/dev/null)" = "Synced" ]; do sleep 5; done
            echo "$app synced"
          done

      - name: Wait for deployments to be ready
        run: |
          kubectl rollout status deployment/python-app --timeout=300s
          kubectl rollout status deployment/echo-app --timeout=300s
          kubectl rollout status deployment/podinfo --timeout=300s

      - name: Run tests
        run: make test

      - name: Destroy
        if: always()
        run: make destroy
